<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>STIMULI | Antigravity Gesture App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');

        :root {
            --bg-gradient: radial-gradient(circle at center, #001a1a 0%, #000505 100%);
            --panel-bg: rgba(0, 10, 20, 0.7);
            --accent-cyan: #00FFFF;
            --accent-lime: #00FF00;
            --accent-magenta: #FF00FF;
            --accent-gold: #FFD700;
            --font-main: 'Syncopate', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-gradient);
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: crosshair;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
        }

        canvas {
            display: block;
        }

        /* UI ELEMENTS */
        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-cyan);
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite ease-in-out;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 60%;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 5px;
            border-left: 3px solid var(--accent-cyan);
            font-size: 10px;
            backdrop-filter: blur(10px);
            z-index: 100;
            min-width: 180px;
        }

        .stats-item {
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            color: #888;
        }

        .stats-item span { color: var(--accent-cyan); }

        .guide-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 250px;
            backdrop-filter: blur(10px);
            border-right: 3px solid var(--accent-magenta);
            z-index: 100;
        }

        .guide-panel h3 {
            margin-bottom: 10px;
            color: var(--accent-magenta);
            font-size: 14px;
            text-align: right;
        }

        .gesture-hint {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .gesture-hint span {
            font-size: 10px;
            color: #666;
        }

        .camera-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            z-index: 100;
        }

        #video-input {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.6;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .loader {
            width: 100px;
            height: 2px;
            background: #222;
            position: relative;
            margin-top: 20px;
        }

        .loader-bar {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: var(--accent-cyan);
            width: 0%;
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: loading 3s infinite ease-in-out;
        }

        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="logo-text">STIMULI</div>
        <div class="loader"><div class="loader-bar"></div></div>
        <p style="margin-top: 15px; font-size: 10px; letter-spacing: 2px; color: #555;">INITIALIZING HAND DETECTION</p>
    </div>

    <div class="logo">
        <div class="logo-icon"></div>
        <div class="logo-text">STIMULI</div>
    </div>

    <div class="guide-panel">
        <h3>GESTURE GUIDE</h3>
        <div class="gesture-hint">OPEN PALM <span>EXPLOSION</span></div>
        <div class="gesture-hint">CLOSED FIST <span>VORTEX</span></div>
        <div class="gesture-hint">PINCH <span>MANDALA</span></div>
        <div class="gesture-hint">ROTATE <span>SPECTRUM</span></div>
        <div class="gesture-hint">TWO HANDS <span>BRIDGE</span></div>
    </div>

        <div class="stats-panel">
            <div class="stats-item">FPS <span id="fps-val">60</span></div>
            <div class="stats-item">PARTICLES <span id="part-val">0</span></div>
            <div class="stats-item">GESTURE <span id="gest-val">IDLE</span></div>
            <div class="stats-item">QUALITY <span id="qual-val">HIGH</span></div>
        </div>

        <button onclick="exportSnapshot()" style="
          position: absolute;
          bottom: 20px;
          left: 220px;
          z-index: 100;
          background: rgba(0,10,20,0.7);
          color: #00FFFF;
          border: 1px solid #00FFFF;
          padding: 8px 16px;
          font-family: 'Syncopate', monospace;
          font-size: 10px;
          letter-spacing: 2px;
          cursor: pointer;
          backdrop-filter: blur(10px);
          border-radius: 4px;
        ">EXPORT PNG</button>

    <div class="camera-preview">
        <video id="video-input" playsinline></video>
    </div>

    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <!-- MediaPipe Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous" integrity="sha384-oHwoZ9HyKv5ark5VOH+XWdbNfmhYtptAOBuV8plz6mAfXvTA6d8fULuYllWouEK2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous" integrity="sha384-q1KhAZhJcJXr3zfC3Tz07pBqQSabwFIZhXlmlUAB8s0zk4ETWERkIKGBCFQ5Jc3e"></script>

    <script>
        /**
         * STIMULI - Antigravity Gesture Web App
         * Modular hand-gesture visualizer with particle physics and spider-web networks.
         */

        const CONFIG = {
            maxParticles: 2000,
            lineGlow: 15,
            particleLife: 1.0,
            particleFade: 0.015,
            handSmoothing: 0.2,
            colors: {
                expansion: ['#00FFFF', '#00FF00', '#0080FF'],
                contraction: ['#FF00FF', '#FF6600', '#FFD700'],
                pinch: ['#CCCCCC', '#FFFACD', '#FFFFFF'],
                rotation: ['#FF0000', '#FFFF00', '#00FF00', '#00FFFF', '#0000FF', '#FF00FF']
            }
        };

        class Particle {
            constructor(x, y, color, vx, vy) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx || (Math.random() - 0.5) * 4;
                this.vy = vy || (Math.random() - 0.5) * 4;
                this.life = 1.0;
                this.size = Math.random() * 3 + 1;
                this.gravity = 0.02;
            }

            update(mode) {
                this.x += this.vx;
                this.y += this.vy;
                
                if (mode === 'VORTEX') {
                    this.vx *= 0.98;
                    this.vy *= 0.98;
                } else {
                    this.vy += this.gravity;
                }

                this.life -= CONFIG.particleFade;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class StimuliApp {
            constructor() {
                this.canvas = document.getElementById('main-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.videoElement = document.getElementById('video-input');
                
                this.handsData = [];
                this.particles = [];
                this.gestureState = 'IDLE';
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 60;

                this.init();
            }

            async init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());

                // Setup MediaPipe Hands
                const hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.7
                });

                hands.onResults((results) => {
                    this.handsData = results.multiHandLandmarks;
                    if (results.multiHandLandmarks.length > 0) {
                        document.getElementById('loading-overlay').style.opacity = '0';
                        setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 1000);
                    }
                });

                const camera = new Camera(this.videoElement, {
                    onFrame: async () => {
                        await hands.send({image: this.videoElement});
                    },
                    width: 640,
                    height: 480
                });
                camera.start();

                // Fallback: hide loading overlay after 6 seconds even if no hand detected
                setTimeout(() => {
                  const overlay = document.getElementById('loading-overlay');
                  overlay.style.opacity = '0';
                  setTimeout(() => overlay.classList.add('hidden'), 1000);
                }, 6000);

                this.loop();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            updateStats() {
                const now = performance.now();
                this.frameCount++;
                if (now - this.lastTime >= 1000) {
                    this.fps = this.frameCount;
                    this.frameCount = 0;
                    this.lastTime = now;
                    document.getElementById('fps-val').innerText = this.fps;
                    document.getElementById('part-val').innerText = this.particles.length;
                    document.getElementById('gest-val').innerText = this.gestureState;
                }
            }

            getGesture(landmarks) {
                // Landmarks: 4(thumb tip), 8(index tip), 12(middle tip), 16(ring tip), 20(pinky tip), 0(palm)
                const tips = [4, 8, 12, 16, 20];
                const palm = landmarks[0];
                
                // Calculate average distance from tips to palm
                let totalDist = 0;
                tips.forEach(idx => {
                    const d = Math.hypot(landmarks[idx].x - palm.x, landmarks[idx].y - palm.y);
                    totalDist += d;
                });
                const avgDist = totalDist / 5;

                // Pinch check (Thumb 4 and Index 8)
                const pinchDist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);

                // Spread check
                const spreadDist = Math.hypot(landmarks[8].x - landmarks[20].x, landmarks[8].y - landmarks[20].y);

                if (pinchDist < 0.05) return 'PINCH';
                if (avgDist < 0.12) return 'FIST';
                if (avgDist > 0.25 && spreadDist > 0.2) return 'OPEN';
                
                return 'IDLE';
            }

            createGradients(colors) {
                const grad = this.ctx.createLinearGradient(0, 0, this.canvas.width, this.canvas.height);
                colors.forEach((c, i) => grad.addColorStop(i / (colors.length - 1), c));
                return grad;
            }

            drawSpiderWeb(landmarks, gesture, side) {
                const fingertips = [4, 8, 12, 16, 20];
                const palm = landmarks[0];
                const speed = 0.01; // Mock speed factor
                
                let colors = CONFIG.colors.expansion;
                if (gesture === 'FIST') colors = CONFIG.colors.contraction;
                if (gesture === 'PINCH') colors = CONFIG.colors.pinch;

                this.ctx.lineWidth = 1.5;
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = colors[0];

                // 1. Connect all fingertips to each other
                for (let i = 0; i < fingertips.length; i++) {
                    for (let j = i + 1; j < fingertips.length; j++) {
                        const p1 = landmarks[fingertips[i]];
                        const p2 = landmarks[fingertips[j]];
                        
                        const x1 = p1.x * this.canvas.width;
                        const y1 = p1.y * this.canvas.height;
                        const x2 = p2.x * this.canvas.width;
                        const y2 = p2.y * this.canvas.height;

                        const dist = Math.hypot(x1 - x2, y1 - y2);
                        this.ctx.lineWidth = Math.max(0.5, 4 - dist/100);
                        
                        const g = this.ctx.createLinearGradient(x1, y1, x2, y2);
                        g.addColorStop(0, colors[0]);
                        g.addColorStop(0.5, colors[1] || colors[0]);
                        g.addColorStop(1, colors[2] || colors[0]);

                        this.ctx.beginPath();
                        if (gesture === 'IDLE' && Math.sin(Date.now() * 0.005) > 0.5) {
                            this.ctx.setLineDash([5, 5]);
                        } else {
                            this.ctx.setLineDash([]);
                        }
                        
                        this.ctx.strokeStyle = g;
                        this.ctx.moveTo(x1, y1);
                        this.ctx.lineTo(x2, y2);
                        this.ctx.stroke();
                    }
                }

                // 2. Connect fingertips to palm
                fingertips.forEach(idx => {
                    const p = landmarks[idx];
                    const px = p.x * this.canvas.width;
                    const py = p.y * this.canvas.height;
                    const cx = palm.x * this.canvas.width;
                    const cy = palm.y * this.canvas.height;

                    this.ctx.beginPath();
                    this.ctx.setLineDash([]);
                    this.ctx.strokeStyle = colors[0];
                    this.ctx.moveTo(px, py);
                    this.ctx.lineTo(cx, cy);
                    this.ctx.stroke();

                    // Spawn particles from fingertips
                    if (Math.random() > 0.5) {
                        let vx = (Math.random() - 0.5) * 2;
                        let vy = (Math.random() - 0.5) * 2;
                        
                        if (gesture === 'OPEN') {
                            vx *= 10; vy *= 10;
                        }

                        this.particles.push(new Particle(px, py, colors[Math.floor(Math.random() * colors.length)], vx, vy));
                    }
                });

                this.ctx.setLineDash([]);
                this.ctx.shadowBlur = 0;
            }

            drawMandala(landmarks) {
                const p1 = landmarks[4]; // Thumb
                const p2 = landmarks[8]; // Index
                const cx = ((p1.x + p2.x) / 2) * this.canvas.width;
                const cy = ((p1.y + p2.y) / 2) * this.canvas.height;
                
                const time = Date.now() * 0.002;
                const colors = CONFIG.colors.pinch;

                this.ctx.save();
                this.ctx.translate(cx, cy);
                this.ctx.strokeStyle = colors[1];
                this.ctx.lineWidth = 0.5;

                for (let i = 0; i < 8; i++) {
                    this.ctx.rotate(Math.PI / 4);
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, 0);
                    const r = 50 + Math.sin(time) * 20;
                    this.ctx.bezierCurveTo(r, r, r, -r, 100, 0);
                    this.ctx.stroke();
                    
                    if (Math.random() < 0.2) {
                         this.particles.push(new Particle(cx, cy, colors[0], Math.cos(i + time) * 5, Math.sin(i + time) * 5));
                    }
                }
                this.ctx.restore();
            }

            drawVortex(landmarks) {
                const palm = landmarks[0];
                const cx = palm.x * this.canvas.width;
                const cy = palm.y * this.canvas.height;
                const time = Date.now() * 0.005;
                
                this.ctx.save();
                this.ctx.translate(cx, cy);
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2 + time;
                    const r = 80;
                    this.ctx.beginPath();
                    this.ctx.arc(Math.cos(angle) * r, Math.sin(angle) * r, 2, 0, Math.PI * 2);
                    this.ctx.fillStyle = CONFIG.colors.contraction[i % 3];
                    this.ctx.fill();
                }
                this.ctx.restore();

                // Pull particles toward center
                this.particles.forEach(p => {
                    const dx = cx - p.x;
                    const dy = cy - p.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 300) {
                        p.vx += dx * 0.001;
                        p.vy += dy * 0.001;
                    }
                });
            }

            drawRotationPattern(landmarks) {
                const palm = landmarks[0];
                const index = landmarks[8];
                const cx = palm.x * this.canvas.width;
                const cy = palm.y * this.canvas.height;
                
                const angle = Math.atan2(index.y - palm.y, index.x - palm.x);
                const hue = (angle * 180 / Math.PI) + 180;
                
                this.ctx.save();
                this.ctx.translate(cx, cy);
                this.ctx.rotate(angle);
                this.ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.8)`;
                this.ctx.lineWidth = 2;
                
                for(let i=0; i<6; i++) {
                    this.ctx.rotate(Math.PI/3);
                    this.ctx.strokeRect(20, 20, 40, 40);
                }
                this.ctx.restore();

                if (this.frameCount % 2 === 0) {
                    this.particles.push(new Particle(cx, cy, `hsl(${hue}, 100%, 50%)`, Math.cos(angle)*8, Math.sin(angle)*8));
                }
            }

            drawBridge() {
                if (this.handsData.length < 2) return;
                
                const h1 = this.handsData[0][0];
                const h2 = this.handsData[1][0];
                
                const x1 = h1.x * this.canvas.width;
                const y1 = h1.y * this.canvas.height;
                const x2 = h2.x * this.canvas.width;
                const y2 = h2.y * this.canvas.height;
                
                const dist = Math.hypot(x1 - x2, y1 - y2);
                
                if (dist < 400) {
                    this.ctx.beginPath();
                    const g = this.ctx.createLinearGradient(x1, y1, x2, y2);
                    g.addColorStop(0, '#00FFFF');
                    g.addColorStop(1, '#FF00FF');
                    this.ctx.strokeStyle = g;
                    this.ctx.lineWidth = 10 * (1 - dist/400);
                    
                    // Arc bridge
                    const mx = (x1 + x2) / 2;
                    const my = (y1 + y2) / 2 - (200 * (1 - dist/400));
                    
                    this.ctx.moveTo(x1, y1);
                    this.ctx.quadraticCurveTo(mx, my, x2, y2);
                    this.ctx.stroke();

                    // Particle collisions at center
                    if (this.frameCount % 3 === 0) {
                        this.particles.push(new Particle(mx, my, '#FFFFFF', (Math.random()-0.5)*15, (Math.random()-0.5)*15));
                    }
                }
            }

            drawSkeleton(landmarks) {
                this.ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                landmarks.forEach((pt, i) => {
                    const x = pt.x * this.canvas.width;
                    const y = pt.y * this.canvas.height;
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, i === 0 || i % 4 === 0 ? 4 : 2, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            }

            loop() {
                // Background Trail Effect (Maximalist organic feel)
                this.ctx.fillStyle = 'rgba(0, 5, 10, 0.15)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.updateStats();

                // Cap particles by removing oldest (from front of array)
                while (this.particles.length > CONFIG.maxParticles) {
                    this.particles.shift();
                }

                // Particle System
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.update(this.gestureState);
                    p.draw(this.ctx);
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }

                // Hand Processing
                if (this.handsData && this.handsData.length > 0) {
                    this.drawBridge();

                    this.handsData.forEach((hand, index) => {
                        const gesture = this.getGesture(hand);
                        this.gestureState = gesture; // Simplification: last hand sets state
                        document.getElementById('gest-val').innerText = this.gestureState;

                        this.drawSpiderWeb(hand, gesture, index === 0 ? 'LEFT' : 'RIGHT');
                        this.drawSkeleton(hand);

                        // Trigger Special Effects
                        switch(gesture) {
                            case 'PINCH':
                                this.drawMandala(hand);
                                break;
                            case 'FIST':
                                this.drawVortex(hand);
                                break;
                            case 'OPEN':
                                // Handled in drawSpiderWeb via particle spawning
                                break;
                        }

                        // Detection for Rotation (Simple vector check between thumb and pinky)
                        const angle = Math.abs(Math.atan2(hand[20].y - hand[4].y, hand[20].x - hand[4].x));
                        if (angle > 1.0 && angle < 2.0) {
                            this.drawRotationPattern(hand);
                            this.gestureState = "ROTATING";
                        }
                    });
                } else {
                    this.gestureState = 'IDLE';
                }

                requestAnimationFrame(() => this.loop());
            }
        }

        // Global utility to export canvas as PNG
        window.exportSnapshot = () => {
            const canvas = document.getElementById('main-canvas');
            const link = document.createElement('a');
            link.download = `stimuli-art-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        // Start App
        window.addEventListener('load', () => {
            new StimuliApp();
            console.log("STIMULI INITIALIZED");
        });

    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW failed:', err));
        });
      }
    </script>
</body>
</html>
