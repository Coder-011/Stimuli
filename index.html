<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>STIMULI | Cat's Cradle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');

        :root {
            --bg-gradient: radial-gradient(circle at center, #000511 0%, #000000 100%);
            --panel-bg: rgba(0, 10, 20, 0.7);
            --accent-cyan: #00FFFF;
            --accent-magenta: #FF00FF;
            --font-main: 'Syncopate', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-gradient);
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: crosshair;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
        }

        canvas { display: block; }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-cyan);
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite ease-in-out;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 60%;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 5px;
            border-left: 3px solid var(--accent-cyan);
            font-size: 10px;
            backdrop-filter: blur(10px);
            z-index: 100;
            min-width: 180px;
        }

        .stats-item {
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            color: #888;
        }

        .stats-item span { color: var(--accent-cyan); }

        .guide-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 250px;
            backdrop-filter: blur(10px);
            border-right: 3px solid var(--accent-magenta);
            z-index: 100;
        }

        .guide-panel h3 {
            margin-bottom: 10px;
            color: var(--accent-magenta);
            font-size: 14px;
            text-align: right;
        }

        .gesture-hint {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .gesture-hint span {
            font-size: 10px;
            color: #666;
        }

        .camera-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            z-index: 100;
        }

        #video-input {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.6;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .loader {
            width: 100px;
            height: 2px;
            background: #222;
            position: relative;
            margin-top: 20px;
        }

        .loader-bar {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: var(--accent-cyan);
            width: 0%;
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: loading 3s infinite ease-in-out;
        }

        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="logo-text">STIMULI</div>
        <div class="loader"><div class="loader-bar"></div></div>
        <p style="margin-top: 15px; font-size: 10px; letter-spacing: 2px; color: #555;">INITIALIZING HAND DETECTION</p>
    </div>

    <div class="logo">
        <div class="logo-icon"></div>
        <div class="logo-text">STIMULI</div>
    </div>

    <div class="guide-panel">
        <h3>CAT'S CRADLE</h3>
        <div class="gesture-hint">TWO HANDS <span>STRING FIGURE</span></div>
        <div class="gesture-hint">MOVE HANDS <span>WEAVE PATTERNS</span></div>
        <div class="gesture-hint">SEPARATE <span>TENSION</span></div>
        <div class="gesture-hint">ROTATE <span>TWIST</span></div>
    </div>

    <div class="stats-panel">
        <div class="stats-item">FPS <span id="fps-val">60</span></div>
        <div class="stats-item">STRINGS <span id="part-val">0</span></div>
        <div class="stats-item">GESTURE <span id="gest-val">IDLE</span></div>
        <div class="stats-item">QUALITY <span id="qual-val">HIGH</span></div>
    </div>

    <button onclick="exportSnapshot()" style="
      position: absolute;
      bottom: 20px;
      left: 220px;
      z-index: 100;
      background: rgba(0,10,20,0.7);
      color: #00FFFF;
      border: 1px solid #00FFFF;
      padding: 8px 16px;
      font-family: 'Syncopate', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      border-radius: 4px;
    ">EXPORT PNG</button>

    <div class="camera-preview">
        <video id="video-input" playsinline></video>
    </div>

    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <!-- MediaPipe Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous" integrity="sha384-oHwoZ9HyKv5ark5VOH+XWdbNfmhYtptAOBuV8plz6mAfXvTA6d8fULuYllWouEK2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous" integrity="sha384-q1KhAZhJcJXr3zfC3Tz07pBqQSabwFIZhXlmlUAB8s0zk4ETWERkIKGBCFQ5Jc3e"></script>

    <script>
        /**
         * STIMULI - Cat's Cradle Visualization
         * 3D string figure connecting fingertips between two hands
         */

        const CONFIG = {
            maxStrings: 2000,
            stringFade: 0.012,
            handSmoothing: 0.3,
            colors: {
                primary: '#00FFFF',
                secondary: '#FF00FF',
                accent: '#FFFF00',
                glow: '#FFFFFF'
            }
        };

        var FINGERTIPS = [4, 8, 12, 16, 20];

        function makeParticle(x1, y1, x2, y2, color, dval) {
            return {
                x1: x1, y1: y1,
                x2: x2, y2: y2,
                color: color,
                life: 1.0,
                dval: dval || 0.5,
                width: 0.5 + (dval || 0.5) * 3,
                update: function() { this.life -= CONFIG.stringFade; },
                draw: function(ctx) {
                    ctx.beginPath();
                    ctx.moveTo(this.x1, this.y1);
                    ctx.lineTo(this.x2, this.y2);
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = this.life * this.dval;
                    ctx.lineWidth = this.width;
                    ctx.shadowBlur = 10 * this.dval;
                    ctx.shadowColor = this.color;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1.0;
                }
            };
        }

        function StimuliApp() {
            this.canvas = document.getElementById('main-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.videoElement = document.getElementById('video-input');
            this.handsData = [];
            this.strings = [];
            this.gestureState = 'IDLE';
            this.frameCount = 0;
            this.lastTime = performance.now();
            this.fps = 60;
            this.smoothHands = [null, null];
            this.init();
        }

        StimuliApp.prototype.init = async function() {
            this.resize();
            window.addEventListener('resize', () => this.resize());

            var self = this;
            var hands = new Hands({
                locateFile: function(file) { return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file; }
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults(function(results) {
                self.handsData = results.multiHandLandmarks || [];
                if (self.handsData.length > 0) {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(function() { document.getElementById('loading-overlay').classList.add('hidden'); }, 1000);
                }
            });

            var camera = new Camera(this.videoElement, {
                onFrame: async function() { await hands.send({image: self.videoElement}); },
                width: 640,
                height: 480
            });
            camera.start();

            setTimeout(function() {
                var overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(function() { overlay.classList.add('hidden'); }, 1000);
            }, 6000);

            this.loop();
        };

        StimuliApp.prototype.resize = function() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        };

        StimuliApp.prototype.updateStats = function() {
            var now = performance.now();
            this.frameCount++;
            if (now - this.lastTime >= 1000) {
                this.fps = this.frameCount;
                this.frameCount = 0;
                this.lastTime = now;
                document.getElementById('fps-val').innerText = this.fps;
                document.getElementById('part-val').innerText = this.strings.length;
            }
        };

        StimuliApp.prototype.smoothLandmarks = function(newLandmarks, handIndex) {
            var self = this;
            if (!self.smoothHands[handIndex]) {
                self.smoothHands[handIndex] = newLandmarks.map(function(p) { return {x: p.x, y: p.y, z: p.z || 0}; });
                return self.smoothHands[handIndex];
            }
            var s = CONFIG.handSmoothing;
            var smoothed = self.smoothHands[handIndex].map(function(old, i) {
                return {
                    x: old.x * s + newLandmarks[i].x * (1 - s),
                    y: old.y * s + newLandmarks[i].y * (1 - s),
                    z: (old.z || 0) * s + (newLandmarks[i].z || 0) * (1 - s)
                };
            });
            self.smoothHands[handIndex] = smoothed;
            return smoothed;
        };

        StimuliApp.prototype.getDepth = function(landmark) {
            return 1.0 - Math.min(1.0, Math.max(0, (landmark.z || 0) * 5 + 0.5));
        };

        StimuliApp.prototype.drawCatsCradle = function(hand1, hand2) {
            var ctx = this.ctx;
            var w = this.canvas.width;
            var h = this.canvas.height;
            var self = this;

            var tips1 = FINGERTIPS.map(function(i) {
                return { x: hand1[i].x * w, y: hand1[i].y * h, z: self.getDepth(hand1[i]), idx: i };
            });
            var tips2 = FINGERTIPS.map(function(i) {
                return { x: hand2[i].x * w, y: hand2[i].y * h, z: self.getDepth(hand2[i]), idx: i };
            });

            var time = Date.now() * 0.001;

            for (var i = 0; i < tips1.length; i++) {
                var t1 = tips1[i];
                var t2 = tips2[i];
                var avgDepth = (t1.z + t2.z) / 2;
                var hue = (i / tips1.length) * 360 + time * 20;
                var color = 'hsl(' + (hue % 360) + ', 100%, ' + (50 + avgDepth * 30) + '%)';

                ctx.beginPath();
                ctx.moveTo(t1.x, t1.y);
                var mx = (t1.x + t2.x) / 2 + Math.sin(time + i) * 20 * (1 - avgDepth);
                var my = (t1.y + t2.y) / 2 + Math.cos(time + i) * 20 * (1 - avgDepth);
                ctx.quadraticCurveTo(mx, my, t2.x, t2.y);
                ctx.strokeStyle = color;
                ctx.lineWidth = 1 + avgDepth * 3;
                ctx.shadowBlur = 15 * avgDepth;
                ctx.shadowColor = color;
                ctx.globalAlpha = 0.6 + avgDepth * 0.4;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;

                if (Math.random() > 0.7) {
                    var t = Math.random();
                    var px = t1.x + (t2.x - t1.x) * t;
                    var py = t1.y + (t2.y - t1.y) * t;
                    self.strings.push(makeParticle(px - 5, py, px + 5, py, color, avgDepth));
                }
            }

            for (var i = 0; i < tips1.length; i++) {
                var t1 = tips1[i];
                var t2 = tips2[tips2.length - 1 - i];
                var avgDepth = (t1.z + t2.z) / 2;
                var hue = 180 + (i / tips1.length) * 360 + time * 30;
                var color = 'hsl(' + (hue % 360) + ', 80%, ' + (40 + avgDepth * 40) + '%)';

                ctx.beginPath();
                ctx.moveTo(t1.x, t1.y);
                var mx = (t1.x + t2.x) / 2 + Math.cos(time * 0.5 + i) * 30;
                var my = (t1.y + t2.y) / 2 + Math.sin(time * 0.5 + i) * 30;
                ctx.quadraticCurveTo(mx, my, t2.x, t2.y);
                ctx.strokeStyle = color;
                ctx.lineWidth = 0.5 + avgDepth * 2;
                ctx.globalAlpha = 0.4 + avgDepth * 0.3;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            var palm1 = { x: hand1[0].x * w, y: hand1[0].y * h, z: this.getDepth(hand1[0]) };
            var palm2 = { x: hand2[0].x * w, y: hand2[0].y * h, z: this.getDepth(hand2[0]) };

            ctx.beginPath();
            ctx.moveTo(palm1.x, palm1.y);
            ctx.lineTo(palm2.x, palm2.y);
            ctx.strokeStyle = 'hsl(' + ((time * 50) % 360) + ', 100%, 50%, 0.3)';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 20;
            ctx.shadowColor = CONFIG.colors.primary;
            ctx.stroke();
            ctx.shadowBlur = 0;

            var allTips = tips1.concat(tips2);
            allTips.forEach(function(t) {
                ctx.beginPath();
                ctx.arc(t.x, t.y, 4 + t.z * 4, 0, Math.PI * 2);
                ctx.fillStyle = 'hsl(' + ((t.idx * 72 + time * 40) % 360) + ', 100%, 60%, ' + (0.5 + t.z * 0.5) + ')';
                ctx.shadowBlur = 15 * t.z;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        };

        StimuliApp.prototype.drawSingleHand = function(landmarks) {
            var ctx = this.ctx;
            var w = this.canvas.width;
            var h = this.canvas.height;
            var self = this;

            var tips = FINGERTIPS.map(function(i) {
                return { x: landmarks[i].x * w, y: landmarks[i].y * h, z: self.getDepth(landmarks[i]) };
            });

            var time = Date.now() * 0.001;

            for (var i = 0; i < tips.length; i++) {
                var t1 = tips[i];
                var t2 = tips[(i + 1) % tips.length];
                var avgDepth = (t1.z + t2.z) / 2;
                var hue = (i / tips.length) * 360 + time * 20;
                ctx.beginPath();
                ctx.moveTo(t1.x, t1.y);
                ctx.lineTo(t2.x, t2.y);
                ctx.strokeStyle = 'hsl(' + (hue % 360) + ', 100%, ' + (50 + avgDepth * 30) + '%)';
                ctx.lineWidth = 1 + avgDepth * 2;
                ctx.globalAlpha = 0.5 + avgDepth * 0.5;
                ctx.shadowBlur = 10 * avgDepth;
                ctx.shadowColor = ctx.strokeStyle;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            }

            tips.forEach(function(t, i) {
                ctx.beginPath();
                ctx.arc(t.x, t.y, 3 + t.z * 3, 0, Math.PI * 2);
                ctx.fillStyle = 'hsl(' + ((i * 72 + time * 30) % 360) + ', 100%, 60%)';
                ctx.fill();
            });
        };

        StimuliApp.prototype.loop = function() {
            var ctx = this.ctx;
            var self = this;

            ctx.fillStyle = 'rgba(0, 5, 17, 0.15)';
            ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.updateStats();

            for (var i = this.strings.length - 1; i >= 0; i--) {
                this.strings[i].update();
                this.strings[i].draw(ctx);
                if (this.strings[i].life <= 0) {
                    this.strings.splice(i, 1);
                }
            }

            while (this.strings.length > CONFIG.maxStrings) {
                this.strings.shift();
            }

            if (this.handsData && this.handsData.length > 0) {
                var hand1 = this.smoothLandmarks(this.handsData[0], 0);

                if (this.handsData.length >= 2) {
                    var hand2 = this.smoothLandmarks(this.handsData[1], 1);
                    this.gestureState = "CAT'S CRADLE";
                    this.drawCatsCradle(hand1, hand2);
                } else {
                    this.gestureState = 'SINGLE HAND';
                    this.drawSingleHand(hand1);
                    this.smoothHands[1] = null;
                }
            } else {
                this.gestureState = 'IDLE';
                this.smoothHands = [null, null];
            }

            document.getElementById('gest-val').innerText = this.gestureState;

            requestAnimationFrame(function() { self.loop(); });
        };

        window.exportSnapshot = function() {
            var canvas = document.getElementById('main-canvas');
            var link = document.createElement('a');
            link.download = 'stimuli-cats-cradle-' + Date.now() + '.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        window.addEventListener('load', function() {
            new StimuliApp();
            console.log("STIMULI CAT'S CRADLE INITIALIZED");
        });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) { console.warn('SW failed:', err); });
        });
      }
    </script>
</body>
</html>
